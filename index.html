<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,
        initial-scale=1.0">
        <title>Rock,Paper,Scissors</title>
        <link rel="stylesheet" href="./src/outpt.css">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        
    </head>  

    <body class="bg-black">

       
        <div class="bg-linear-to-r bg-orange-500 rounded-xl w-220 h-220 ml-80 mt-10">
            <h1 class="text-7xl text-black text-center font-bold">Rock-Paper-Scissors</h1>

                <div class="flex justify-between text-2xl font-bold mt-10 m-10">
                    <p>Player score : <span id="player-score">0</span></p>
                    <p>Computer score : <span id="computer-score">0</span></p>
                </div>

                <div class="flex items-center justify-between mb-6 mt-5 m-10">
                    <div class="w-50 h-full items-center justify-center border-4 rounded-lg text-xl text-center font-bold">Player choice
                       <img id="player-choice" src="./question.png">
                    </div>
                    <span class="mx-4 text-xl font-bold">VS</span>
                    <div class="w-50 h-full items-center justify-center border-4 rounded-lg text-xl font-bold text-center">Computer choice
                        <img id="computer-choice" src="./question.png">
                    </div>
                </div>
                <div class="flex justify-between m-10">
                    <button data-choice="Rock" onclick="play('Rock')" class="bg-violet-600 px-20 py-20 rounded-2xl">
                        <img src="./rock.png" alt="rock" class="h-20 w-20">
                    </button>
                    <button data-choice="Paper" onclick="play('Paper')"  class="bg-yellow-200 px-20 py-20 rounded-2xl">
                        <img src="./paper .png" alt="paper" class="h-20 w-20">
                    </button>
                    <button data-choice="Scissors" onclick="play('Scissors')"  class="bg-green-500 px-20 py-20 rounded-2xl">
                        <img src="./scissors .png" alt="scissors" class="h-20 w-20">
                    </button>
                </div>
            </h1>
            <p id="result" class="mt-6 text-lg font-bold"></p>
        </div>

        <script src="game.js"></script>
        
    </body>


</html>
